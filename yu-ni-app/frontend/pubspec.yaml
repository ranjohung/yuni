name: yu_ni_app
description: "「与你」App - AI数字人社交模拟训练平台"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 网络请求
  http: ^1.2.0
  # 状态管理
  provider: ^6.1.0
  # 本地存储
  shared_preferences: ^2.2.0
  # 路由
  go_router: ^14.0.0
  # 图表（雷达图/曲线图）
  fl_chart: ^0.68.0
  # 骨架屏
  shimmer: ^3.0.0
  # 图片缓存
  cached_network_image: ^3.3.0
  # 动画
  lottie: ^3.0.0
  # 下拉刷新
  pull_to_refresh: ^2.0.0
  # 吐司提示
  fluttertoast: ^8.2.0
  # WebSocket/SSE
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
